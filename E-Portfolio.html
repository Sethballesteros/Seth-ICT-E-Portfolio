  color: white;

  padding: 20px;
  border-radius: 12px;
  display: block;
  transition: 0.3s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
a:hover {
  background-color: #b0e0e6;
  color: #033f47;
  transform: scale(1.05);
}
footer {
  background-color: #046b79;
  color: white;
  padding: 15px;
  margin-top: 40px;
  font-size: 16px;
  letter-spacing: 0.5px;

  header {
